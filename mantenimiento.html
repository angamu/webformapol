<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sitio en mantenimiento</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --c-blue:    #1A3F6F;
      --c-blue2:   #2d00a5;
      --c-cyan:    #00A8CC;
      --c-dark:    #0D1B2A;
      --c-dark2:   #0a1520;
      --font-sans: 'Montserrat', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    html, body {
      height: 100%;
      font-family: var(--font-sans);
      background: var(--c-dark);
      color: white;
      overflow: hidden;
    }

    /* ── GRID DE FONDO ── */
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.03) 39px, rgba(255,255,255,0.03) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.03) 39px, rgba(255,255,255,0.03) 40px);
    }

    /* ── GLOW ── */
    .bg-glow {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 50%, rgba(45,0,165,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 80% 50%, rgba(0,168,204,0.12) 0%, transparent 70%);
    }

    /* ── BARRA SUPERIOR ── */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      height: 4px;
      background: linear-gradient(90deg, var(--c-blue2), var(--c-cyan), var(--c-blue));
      animation: shimmer 3s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    /* ── CONTENEDOR CENTRAL ── */
    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    /* ── LOGOS ── */
    .logos {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 3rem;
      padding: 12px 22px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      animation: fadeUp 0.6s ease both;
      width: 300px;
    }
    .logos-sep {
      width: 1px; height: 32px;
      background: linear-gradient(180deg, var(--c-blue2), var(--c-cyan));
      opacity: 0.4;
    }
    .logo-img {
      width: 100%;
      display: block;
      opacity: 0.9;
      filter: brightness(1.1);
    }

    /* ── ICONO ENGRANAJE ANIMADO ── */
    .gear-wrap {
      position: relative;
      width: 80px; height: 80px;
      margin: 0 auto 2.5rem;
      animation: fadeUp 0.6s ease 0.1s both;
    }
    .gear {
      width: 80px; height: 80px;
      border: 3px solid rgba(0,168,204,0.25);
      border-top-color: var(--c-cyan);
      border-radius: 50%;
      animation: spin 2.5s linear infinite;
    }
    .gear-inner {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 40px; height: 40px;
      border: 2px solid rgba(45,0,165,0.3);
      border-bottom-color: var(--c-blue2);
      border-radius: 50%;
      animation: spin 1.8s linear infinite reverse;
    }
    .gear-dot {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--c-cyan);
      box-shadow: 0 0 10px var(--c-cyan);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── ETIQUETA ── */
    .label {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--c-cyan);
      margin-bottom: 1rem;
      animation: fadeUp 0.6s ease 0.2s both;
    }
    .label::before { content: '// '; opacity: 0.5; }

    /* ── TÍTULO ── */
    .title {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 1rem;
      animation: fadeUp 0.6s ease 0.3s both;
    }
    .title span {
      background: linear-gradient(90deg, #ffffff, var(--c-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── DESCRIPCIÓN ── */
    .desc {
      font-size: 1rem;
      font-weight: 300;
      color: rgba(255,255,255,0.5);
      max-width: 420px;
      line-height: 1.75;
      margin-bottom: 2.5rem;
      animation: fadeUp 0.6s ease 0.4s both;
    }

    /* ── BARRA DE PROGRESO ── */
    .progress-wrap {
      width: 100%;
      max-width: 360px;
      margin-bottom: 2.5rem;
      animation: fadeUp 0.6s ease 0.5s both;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-bottom: 6px;
    }
    .progress-track {
      height: 4px;
      background: rgba(255,255,255,0.06);
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--c-blue2), var(--c-cyan));
      border-radius: 4px;
      transition: width 0.4s ease;
    }

    /* ── CONTACTO ── */
    .contact-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.4);
      animation: fadeUp 0.6s ease 0.6s both;
    }
    .contact-row a {
      color: var(--c-cyan);
      text-decoration: none;
      font-weight: 500;
      transition: opacity 0.2s;
    }
    .contact-row a:hover { opacity: 0.75; }

    /* ── PUNTOS PARPADEANTES ── */
    .dots span {
      animation: blink 1.4s ease-in-out infinite;
      opacity: 0;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0; }
      40% { opacity: 1; }
    }

    /* ── ANIMACIONES ENTRADA ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── FOOTER ── */
    .footer {
      position: fixed; bottom: 1.5rem; left: 0; right: 0;
      text-align: center;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.15);
    }
  </style>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <div class="topbar"></div>

  <main class="page">

    <!-- Logos -->
    <div class="logos">
      <img src="images/logo-tras-xl.png" class="logo-img" alt="Formapol" />
    </div>

    <!-- Engranaje animado -->
    <div class="gear-wrap">
      <div class="gear"></div>
      <div class="gear-inner"></div>
      <div class="gear-dot"></div>
    </div>

    <!-- Etiqueta -->

    <!-- Título -->
    <h1 class="title">
      Estamos trabajando<br>
      <span>en mejoras para ti<span class="dots"><span>.</span><span>.</span><span>.</span></span></span>
    </h1>

    <!-- Descripción -->
    <p class="desc">
      Nuestro sitio se encuentra temporalmente fuera de servicio mientras realizamos actualizaciones. Estaremos de vuelta muy pronto.
    </p>

    <!-- Barra de progreso -->
    <div class="progress-wrap">
      <div class="progress-label">
        <span id="pct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-bar" id="bar"></div>
      </div>
    </div>

    <!-- Contacto -->
    <p class="contact-row">
      ¿Necesita asistencia? &nbsp;
      <a href="mailto:tecnica@siteco.com.co">tecnica@siteco.com.co</a>
      &nbsp;·&nbsp;
      <a href="tel:+5768740628">+57 (606) 874 0628</a>
    </p>

  </main>

  <footer class="footer">
    formapol.com &nbsp;·&nbsp; Colombia
  </footer>

  <script>
    // Animar la barra de progreso de forma aleatoria hasta ~85%
    let current = 0;
    const bar = document.getElementById('bar');
    const pct = document.getElementById('pct');

    function step() {
      const increment = Math.random() * 8 + 2;
      current = Math.min(current + increment, 85);
      bar.style.width = current + '%';
      pct.textContent = Math.round(current) + '%';
      if (current < 85) {
        setTimeout(step, Math.random() * 600 + 300);
      }
    }

    setTimeout(step, 800);
  </script>

</body>
</html>
